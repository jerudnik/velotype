name: Fork maintenance

# Default-branch scheduler for fork maintenance. Keep this workflow tiny: it
# dispatches the branch-stack Nix workflow registered on the default branch.

on:
  schedule:
    - cron: "17 */6 * * *" # Sync upstream every six hours.
    - cron: "47 6 * * 1" # Update flake.lock after the Monday 06:17 UTC sync.
  workflow_dispatch:
    inputs:
      task:
        description: "Maintenance task to dispatch"
        required: true
        default: sync-upstream
        type: choice
        options:
          - sync-upstream
          - update-flake-lock

permissions:
  actions: write
  contents: read

concurrency:
  group: fork-maintenance-${{ github.workflow }}-${{ github.event.schedule || github.event.inputs.task || github.ref }}
  cancel-in-progress: true

jobs:
  dispatch-sync:
    name: dispatch upstream sync
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '17 */6 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'sync-upstream')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Nix sync task
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run Nix --repo "$GITHUB_REPOSITORY" --ref main -f task=sync-upstream

  dispatch-lock-update:
    name: dispatch flake.lock update
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '47 6 * * 1') ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'update-flake-lock')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Nix lock update task
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run Nix --repo "$GITHUB_REPOSITORY" --ref main -f task=update-flake-lock
